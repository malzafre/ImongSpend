name: Extension CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extension-checks:
    name: Extension Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint extension
        run: npm run lint:extension

      - name: Typecheck shared package
        run: npm run typecheck --workspace @imongspend/shared

      - name: Typecheck extension
        run: npm run typecheck --workspace @imongspend/extension

      - name: Build extension
        run: npm run build:extension
